<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Vision Expert | 색각 정밀 검사</title>
    <meta name="description" content="색각 인지 능력을 정밀하게 측정하는 전문 온라인 검사 도구입니다.">
    <!-- Preconnect & DNS prefetch -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fonts — Unified Serif Font (Noto Serif KR) -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <!-- Cursive Display Font -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-[#FAF7F2] text-stone-800 overflow-hidden select-none touch-pan-y">

    <!-- ═══ WebGL Background Canvas (hidden by CSS) ═══ -->
    <canvas id="webgl-bg" class="fixed inset-0 z-0 pointer-events-none" aria-hidden="true"></canvas>

    <!-- ═══ Aurora Background (hidden by CSS) ═══ -->
    <div class="aurora-bg" aria-hidden="true">
        <div class="aurora-blob"></div>
        <div class="aurora-blob"></div>
        <div class="aurora-blob"></div>
    </div>

    <!-- ═══ Film Grain Noise Overlay (hidden by CSS) ═══ -->
    <svg class="fixed inset-0 z-[2] pointer-events-none w-full h-full opacity-[0.035]" aria-hidden="true">
        <filter id="noiseFilter">
            <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="4" stitchTiles="stitch" />
            <feColorMatrix type="saturate" values="0" />
        </filter>
        <rect width="100%" height="100%" filter="url(#noiseFilter)" />
    </svg>

    <!-- ═══ Cursor Glow Follower (hidden by CSS) ═══ -->
    <div id="cursor-glow" class="fixed pointer-events-none z-[3] opacity-0 transition-opacity duration-500"
        aria-hidden="true"
        style="width: 600px; height: 600px; border-radius: 50%; background: radial-gradient(circle, rgba(120, 100, 200, 0.08) 0%, rgba(80, 140, 180, 0.04) 40%, transparent 70%); transform: translate(-50%, -50%); will-change: transform;">
    </div>

    <!-- ═══ Navigation Bar ═══ -->
    <nav class="fixed top-6 left-1/2 transform -translate-x-1/2 z-50 flex items-center gap-4 sm:gap-6">
        <button onclick="window.setMode('home')" id="nav-home"
            class="display-font text-sm sm:text-base font-bold transition-all text-stone-800"
            style="font-family: 'Playfair Display', 'Noto Serif KR', serif;">Home</button>
        <button onclick="window.setMode('test')" id="nav-test"
            class="display-font text-sm sm:text-base font-bold transition-all text-stone-400 hover:text-stone-800"
            style="font-family: 'Playfair Display', 'Noto Serif KR', serif;">Test</button>
        <button onclick="window.setMode('lab')" id="nav-lab"
            class="display-font text-sm sm:text-base font-bold transition-all text-stone-400 hover:text-stone-800"
            style="font-family: 'Playfair Display', 'Noto Serif KR', serif;">Lab</button>
        <button onclick="window.setMode('challenge')" id="nav-challenge"
            class="display-font text-sm sm:text-base font-bold transition-all text-stone-400 hover:text-stone-800"
            style="font-family: 'Playfair Display', 'Noto Serif KR', serif;">Play</button>
    </nav>

    <!-- ═══ Main Content Zone ═══ -->
    <main class="content-zone w-screen h-[100dvh] flex relative z-10 pt-16 sm:pt-20">
        <div id="app"
            class="w-full h-full overflow-y-auto overflow-x-hidden px-4 py-2 sm:px-6 sm:py-4 lg:px-16 lg:py-6 transition-all duration-500 ease-out">
        </div>
    </main>

    <script defer src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
    <script type="module" src="app.js"></script>
</body>

</html>
